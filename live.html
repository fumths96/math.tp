<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đánh giá Video Google Drive</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none; }
        .video-container { margin-top: 20px; }
        iframe { width: 100%; height: 450px; border: none; }
        textarea { width: 100%; height: 100px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Hệ thống Đánh giá Video</h2>

    <div id="login-section">
        <button id="btn-login">Đăng nhập bằng Gmail</button>
    </div>

    <div id="content-section" class="hidden">
        <p>Chào mừng, <span id="user-name"></span>! <button id="btn-logout">Đăng xuất</button></p>
        
        <div class="video-container">
            <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview"></iframe>
        </div>

        <h3>Viết đánh giá của bạn:</h3>
        <textarea id="review-text" placeholder="Nhập cảm nghĩ của bạn về video..."></textarea>
        <br>
        <button id="btn-submit">Gửi đánh giá</button>
        <p id="status"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // CẤU HÌNH FIREBASE (Lấy từ Firebase Console)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Các phần tử giao diện
        const loginSec = document.getElementById('login-section');
        const contentSec = document.getElementById('content-section');
        const userNameDisp = document.getElementById('user-name');

        // 1. Xử lý Đăng nhập
        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);

        // 2. Xử lý Đăng xuất
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // 3. Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSec.classList.add('hidden');
                contentSec.classList.remove('hidden');
                userNameDisp.innerText = user.displayName;
            } else {
                loginSec.classList.remove('hidden');
                contentSec.classList.add('hidden');
            }
        });

        // 4. Lưu đánh giá vào Firestore
        document.getElementById('btn-submit').onclick = async () => {
            const text = document.getElementById('review-text').value;
            if(!text) return alert("Vui lòng nhập đánh giá!");

            try {
                await addDoc(collection(db, "reviews"), {
                    uid: auth.currentUser.uid,
                    name: auth.currentUser.displayName,
                    email: auth.currentUser.email,
                    review: text,
                    timestamp: new Date()
                });
                document.getElementById('status').innerText = "Gửi đánh giá thành công!";
                document.getElementById('review-text').value = "";
            } catch (e) {
                console.error("Lỗi: ", e);
            }
        };
    </script>
</body>
</html>
